name: Release Document Bridge Desktop

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: erp-midas-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      release_sha: ${{ steps.release.outputs.release_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compute and apply next version
        id: release
        shell: bash
        run: |
          NEXT_TAG="$(npm run version:next --silent)"
          NEXT_VERSION="${NEXT_TAG#v}"

          node -e 'const fs = require("node:fs"); const path = require("node:path"); const file = path.resolve("package.json"); const pkg = JSON.parse(fs.readFileSync(file, "utf8")); pkg.version = process.argv[1]; fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + "\n");' "${NEXT_VERSION}"
          npm install --package-lock-only

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): ${NEXT_VERSION}" || true
          git push origin HEAD:${GITHUB_REF_NAME}

          RELEASE_SHA="$(git rev-parse HEAD)"
          if ! git rev-parse "${NEXT_TAG}" >/dev/null 2>&1; then
            git tag "${NEXT_TAG}" "${RELEASE_SHA}"
            git push origin "${NEXT_TAG}"
          fi

          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: windows-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:github -- -c.publish.releaseType=draft

  verify-assets:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - publish

    steps:
      - name: Verify GitHub release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          RELEASE_TAG="${{ needs.prepare-release.outputs.tag }}"
          RELEASE_JSON="$(gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" --json assets)"

          echo "${RELEASE_JSON}" | node -e '
            const release = JSON.parse(require("node:fs").readFileSync(0, "utf8"));
            const names = (release.assets ?? []).map((asset) => asset.name);
            const expected = [
              "latest.yml",
              "Document Bridge Setup",
            ];

            const missing = expected.filter((pattern) => !names.some((name) => name.includes(pattern)));
            if (missing.length > 0) {
              console.error(`Missing release assets: ${missing.join(", ")}`);
              console.error(`Assets found: ${names.join(", ") || "(none)"}`);
              process.exit(1);
            }
          '

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - verify-assets

    steps:
      - name: Publish validated release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh release edit "${{ needs.prepare-release.outputs.tag }}" --repo "${GH_REPO}" --draft=false
