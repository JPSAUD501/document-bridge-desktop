<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bgGrad" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1a2845"/>
      <stop offset="100%" stop-color="#090d1a"/>
    </radialGradient>
    <linearGradient id="goldGrad" x1="20%" y1="100%" x2="80%" y2="0%">
      <stop offset="0%" stop-color="#b8720a"/>
      <stop offset="45%" stop-color="#d4a020"/>
      <stop offset="100%" stop-color="#f0cc50"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4a020" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f5d860" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="88"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="97" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="97" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.18"/>

  <g clip-path="url(#circleClip)" filter="url(#glow)">

    <!-- Main wing (upper-left sweep) -->
    <path d="M 88,115
             C 76,98 58,74 50,50
             C 44,31 54,18 68,20
             C 84,23 108,44 118,60
             C 123,70 120,86 112,96 Z"
          fill="url(#goldGrad)"/>

    <!-- Wing depth / secondary layer -->
    <path d="M 88,115
             C 72,94 52,66 52,44
             C 52,27 66,15 82,19
             C 98,23 120,44 126,62
             L 112,70
             C 104,55 88,42 74,43
             C 64,44 58,54 62,66
             C 66,80 80,98 90,108 Z"
          fill="url(#goldLight)" opacity="0.5"/>

    <!-- Wing feather tips -->
    <path d="M 50,50 C 46,38 48,26 56,22 C 50,30 50,40 55,48 Z" fill="url(#goldGrad)" opacity="0.5"/>
    <path d="M 62,35 C 60,25 64,18 72,18 C 67,24 64,30 65,36 Z" fill="url(#goldGrad)" opacity="0.4"/>
    <path d="M 78,27 C 78,19 84,16 90,18 C 86,22 82,26 82,31 Z" fill="url(#goldGrad)" opacity="0.35"/>

    <!-- Horse body -->
    <ellipse cx="116" cy="124" rx="29" ry="18" transform="rotate(-12, 116, 124)" fill="url(#goldGrad)"/>

    <!-- Neck -->
    <path d="M 128,108
             C 132,93 138,78 144,68
             C 147,62 144,55 139,58
             C 133,62 127,79 125,94 Z"
          fill="url(#goldGrad)"/>

    <!-- Head -->
    <ellipse cx="144" cy="65" rx="13" ry="9" transform="rotate(-28, 144, 65)" fill="url(#goldGrad)"/>

    <!-- Muzzle -->
    <path d="M 150,60 C 157,56 163,59 162,66 C 161,73 155,75 150,73 Z"
          fill="url(#goldGrad)" opacity="0.9"/>

    <!-- Ear -->
    <path d="M 138,56 C 138,48 143,44 147,48 C 145,53 141,57 138,56 Z"
          fill="url(#goldGrad)"/>

    <!-- Eye -->
    <circle cx="148" cy="63" r="2.5" fill="#090d1a" opacity="0.9"/>
    <circle cx="148" cy="63" r="1.1" fill="#f0cc50" opacity="0.5"/>

    <!-- Mane -->
    <path d="M 128,108
             C 122,100 114,96 108,100
             C 100,104 98,115 103,122 Z"
          fill="url(#goldLight)" opacity="0.65"/>

    <!-- Tail -->
    <path d="M 87,122
             C 74,128 60,134 52,127
             C 46,121 50,112 58,112
             C 66,112 78,118 87,120 Z"
          fill="url(#goldGrad)" opacity="0.72"/>

    <!-- Front leg 1 -->
    <path d="M 106,138 C 102,148 98,157 96,162 C 95,166 98,167 101,163 C 105,157 109,148 111,140 Z"
          fill="url(#goldGrad)" opacity="0.78"/>

    <!-- Front leg 2 -->
    <path d="M 114,136 C 112,146 110,154 110,159 C 110,163 113,163 115,159 C 116,154 117,145 118,137 Z"
          fill="url(#goldGrad)" opacity="0.62"/>

    <!-- Rear leg -->
    <path d="M 130,138 C 134,148 136,157 134,162 C 133,165 131,165 130,162 C 128,157 125,148 125,140 Z"
          fill="url(#goldGrad)" opacity="0.75"/>

    <!-- Speed lines -->
    <line x1="157" y1="116" x2="177" y2="112" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="159" y1="124" x2="181" y2="122" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <line x1="155" y1="108" x2="172" y2="101" stroke="url(#goldGrad)" stroke-width="1" opacity="0.28" stroke-linecap="round"/>

    <!-- Star sparkles -->
    <circle cx="38" cy="76" r="1.2" fill="#f0cc50" opacity="0.5"/>
    <circle cx="44" cy="60" r="0.8" fill="#f0cc50" opacity="0.4"/>
    <circle cx="32" cy="64" r="0.7" fill="#f0cc50" opacity="0.35"/>
    <circle cx="170" cy="80" r="0.9" fill="#f0cc50" opacity="0.35"/>
    <circle cx="175" cy="68" r="0.6" fill="#f0cc50" opacity="0.28"/>
    <circle cx="165" cy="92" r="0.6" fill="#f0cc50" opacity="0.22"/>

  </g>
</svg>
